<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NotebookLM Exporter</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      body {
        margin: 0;
        width: 320px;
        background: linear-gradient(180deg, #f8fbff 0%, #eef4fb 100%);
        color: #132238;
      }

      main {
        padding: 16px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 16px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        font-size: 13px;
        line-height: 1.45;
        color: #42526b;
      }

      .panel {
        display: grid;
        gap: 12px;
        padding: 14px;
        border: 1px solid rgba(19, 34, 56, 0.08);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.84);
        box-shadow: 0 10px 30px rgba(15, 58, 115, 0.08);
      }

      .button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        min-height: 40px;
        padding: 0 16px;
        background: linear-gradient(135deg, #0f766e, #155e75);
        color: #fff;
        font: 600 13px/1 "Segoe UI", system-ui, sans-serif;
        cursor: pointer;
      }

      .button:disabled {
        opacity: 0.72;
        cursor: wait;
      }

      .status {
        min-height: 34px;
        font-size: 12px;
        line-height: 1.45;
        color: #42526b;
      }

      .status[data-state="error"] {
        color: #9f1239;
      }

      .status[data-state="success"] {
        color: #166534;
      }

      .hint {
        font-size: 12px;
        color: #5c6b82;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <div>
          <h1>NotebookLM Exporter</h1>
          <p>Exporta la conversacion abierta a Markdown con fuentes por respuesta.</p>
        </div>

        <button id="export-button" class="button" type="button">Exportar conversacion abierta</button>
        <div id="status" class="status" data-state="idle">Abre una conversacion de NotebookLM en la pestaña activa y pulsa exportar.</div>
        <div class="hint">El boton dentro de NotebookLM sigue funcionando igual; este popup es una via adicional.</div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
